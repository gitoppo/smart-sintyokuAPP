<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>事務用 出荷管理</title>
<style>
/* ===== リセット・基本 ===== */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;background:#f5f5f5;color:#333;}
button{cursor:pointer;font-size:13px;border:none;border-radius:4px;padding:6px 12px;}
input,select,textarea{font-size:13px;border:1px solid #ccc;border-radius:4px;padding:5px 8px;width:100%;}
select{background:#fff;}
textarea{resize:vertical;}

/* ===== タブバー ===== */
#tabBar{position:sticky;top:0;z-index:100;display:flex;background:#1a1a2e;border-bottom:2px solid #0f3460;}
.tab{flex:1;padding:10px 4px;color:#aaa;text-align:center;font-size:12px;cursor:pointer;border:none;background:none;}
.tab.active{color:#e94560;border-bottom:3px solid #e94560;font-weight:bold;}

/* ===== タブコンテンツ ===== */
.tabContent{display:none;padding:10px;}
.tabContent.active{display:block;}

/* ===== カード ===== */
.card{background:#fff;border-radius:6px;padding:12px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.1);}
.cardTitle{font-weight:bold;font-size:13px;margin-bottom:8px;color:#1a1a2e;border-bottom:1px solid #eee;padding-bottom:6px;}

/* ===== ボタン色 ===== */
.btn-primary{background:#0f3460;color:#fff;}
.btn-primary:hover{background:#1a1a2e;}
.btn-danger{background:#e94560;color:#fff;}
.btn-danger:hover{background:#c73652;}
.btn-success{background:#27ae60;color:#fff;}
.btn-success:hover{background:#219a52;}
.btn-warn{background:#e67e22;color:#fff;}
.btn-warn:hover{background:#ca6f1e;}
.btn-gray{background:#999;color:#fff;}
.btn-gray:hover{background:#777;}
.btn-sm{padding:4px 8px;font-size:12px;}

/* ===== パレット ===== */
.palletBlock{border:1px solid #ddd;border-radius:6px;margin-bottom:10px;overflow:hidden;}
.palletHeader{background:#e8f0fe;padding:8px 12px;display:flex;align-items:center;gap:8px;font-weight:bold;font-size:13px;}
.palletHeader button{margin-left:auto;}
.palletBody{padding:10px;}
.palletRow{display:grid;grid-template-columns:1fr 80px 32px;gap:6px;align-items:center;margin-bottom:6px;}
.palletRow select{width:100%;}
.baraBlock{border:1px solid #f0c040;border-radius:6px;margin-bottom:10px;overflow:hidden;}
.baraHeader{background:#fffbe6;padding:8px 12px;font-weight:bold;font-size:13px;}
.baraBody{padding:10px;}

/* ===== テーブル ===== */
table{width:100%;border-collapse:collapse;font-size:12px;}
th{background:#1a1a2e;color:#fff;padding:6px 8px;text-align:left;}
td{padding:6px 8px;border-bottom:1px solid #eee;}
tr:nth-child(even) td{background:#f9f9f9;}
.group-header td{background:#e8f0fe;font-weight:bold;font-size:11px;color:#555;}

/* ===== 出荷履歴 ===== */
.historyItem{border:1px solid #ddd;border-radius:6px;margin-bottom:8px;overflow:hidden;}
.historyHead{background:#f0f0f0;padding:8px 12px;display:flex;justify-content:space-between;align-items:center;font-size:12px;cursor:pointer;}
.historyBody{padding:8px 12px;font-size:12px;display:none;}
.historyBody.open{display:block;}
.historySlip{border:1px solid #ddd;border-radius:4px;padding:8px;margin-bottom:6px;font-size:12px;}
.historySlipHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}

/* ===== 設定 ===== */
.settingRow{margin-bottom:10px;}
.settingRow label{display:block;font-size:12px;color:#666;margin-bottom:4px;}

/* ===== 請求書 ===== */
.invoiceTable{width:100%;border-collapse:collapse;font-size:13px;}
.invoiceTable th{background:#1a1a2e;color:#fff;padding:8px;}
.invoiceTable td{padding:8px;border-bottom:1px solid #eee;}
.invoiceTable .subtotal td{background:#f0f4ff;font-weight:bold;}
.invoiceTable .total td{background:#1a1a2e;color:#fff;font-weight:bold;}

/* ===== トースト ===== */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;display:none;z-index:9999;}

/* ===== ローディング ===== */
#loading{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:9998;display:none;}
#loading span{background:#fff;padding:16px 28px;border-radius:8px;font-size:14px;}

/* ===== 編集モーダル ===== */
#editModal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9990;display:none;align-items:center;justify-content:center;}
#editModal.open{display:flex;}
#editModalInner{background:#fff;border-radius:8px;padding:20px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto;}
.editSlipBlock{border:1px solid #ddd;border-radius:6px;margin-bottom:10px;overflow:hidden;}
.editSlipHead{background:#e8f0fe;padding:8px 12px;font-weight:bold;font-size:13px;display:flex;align-items:center;gap:8px;}
.editSlipBody{padding:10px;}
.editRow{display:grid;grid-template-columns:1fr 80px 32px;gap:6px;align-items:center;margin-bottom:6px;}

/* ===== パレット行拡張 ===== */
.pallet-row-ext{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.pallet-row-label{font-size:16px;font-weight:600;flex:1;min-width:0;}
.pallet-row-sub{font-size:11px;color:#0f3460;}
.pallet-row-case{font-size:13px;color:#0f3460;font-weight:600;min-width:50px;text-align:right;}
.pallet-row-qty{width:80px;font-size:16px;padding:6px 4px;text-align:center;border:1px solid #ccc;border-radius:6px;}
.pallet-row-qty.over{border-color:#e94560;background:#fff0f0;}
.pallet-row-qty.under{border-color:#e67e22;background:#fff8f0;}
.check-box{display:flex;align-items:center;gap:4px;}
.check-adj{width:36px;height:36px;border-radius:8px;background:#e8f0fe;color:#0f3460;font-size:20px;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;}
.check-inp{width:60px;font-size:16px;text-align:center;border:2px solid #ccc;border-radius:6px;padding:6px 4px;}
.check-inp.match{border-color:#27ae60;background:#f0fff4;}
.check-inp.nomatch{border-color:#e94560;background:#fff0f0;}
.pallet-total{background:#e8f0fe;padding:6px 10px;border-radius:4px;font-size:13px;font-weight:600;color:#0f3460;margin-top:4px;text-align:right;}
.pallet-warning{color:#e67e22;font-size:12px;margin-top:2px;}
.pallet-error{color:#e94560;font-size:12px;margin-top:2px;}

/* ===== 品目タイル ===== */
.item-tile-grid{display:grid;gap:10px;padding:8px 0;}
.item-tile{background:#fff;border:2px solid #ddd;border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s;-webkit-tap-highlight-color:transparent;user-select:none;}
.item-tile:active{background:#e8f0fe;}
.item-tile-name{font-size:18px;font-weight:700;color:#1a1a2e;line-height:1.3;}
.item-tile-count{display:none;}
.item-tile.has-qty{border-color:#27ae60;background:#f0fff4;}

/* ===== ボトムシート ===== */
.bs-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;}
.bs-overlay.open{display:block;}
.bs{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;border-top:1px solid #ddd;z-index:301;max-height:80vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.5,1);}
.bs.open{transform:translateY(0);}
.bs-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;}
.bs-header{display:flex;align-items:center;padding:14px 16px 12px;border-bottom:1px solid #eee;gap:10px;}
.bs-title{font-size:18px;font-weight:700;flex:1;color:#1a1a2e;}
.bs-close{width:36px;height:36px;border-radius:50%;border:1px solid #ddd;background:#f5f5f5;color:#333;font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.bs-body{padding:12px 16px 24px;}
.bs-color-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid #eee;}
.bs-color-name{font-size:18px;font-weight:700;flex:1;color:#333;}
.bs-qty-input{width:80px;font-size:22px;text-align:center;border:1px solid #ccc;border-radius:8px;padding:8px 4px;}
.bs-adj{width:48px;height:48px;border-radius:10px;background:#e8f0fe;color:#0f3460;font-size:28px;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;border:none;}
.bs-pallet-select{font-size:16px;border:1px solid #ccc;border-radius:8px;padding:8px 10px;background:#fff;margin-top:6px;}

/* ===== 印刷スタイル ===== */
@media print{
  @page{margin:10mm;size:A4 portrait;}
  body{background:#fff;font-size:10.5pt;}
  #tabBar,#toast,#loading,#editModal,#bs,#bs-overlay,.no-print{display:none!important;}
  .tabContent{display:none!important;}
  #printArea{display:block!important;}

  /* 納品書3連：A4をgridで均等3分割 */
  .slip-page{
    width:100%;
    height:277mm;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
  }
  .slip-unit{
    flex:1;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-sizing:border-box;
  }
  .slip-page-break{page-break-after:always;}

  .slip-divider{height:8mm;flex-shrink:0;position:relative;box-sizing:border-box;}
  .slip-divider{display:none;}
  .slip-unit{position:relative;}
  .cut-mark{position:absolute;width:5mm;height:0;border-top:1px dashed #000;}
  .cut-mark-tl{top:0;left:0;}
  .cut-mark-tr{top:0;right:0;}
  .cut-mark-bl{bottom:0;left:0;}
  .cut-mark-br{bottom:0;right:0;}
  .delivery-slip{flex:1;padding:1.5mm 2.5mm;box-sizing:border-box;overflow:hidden;display:flex;flex-direction:column;}
  .slip-title{font-size:10.5pt;font-weight:bold;text-align:center;margin-bottom:0.5mm;}
  .slip-info{display:flex;justify-content:space-between;font-size:8pt;margin-bottom:0.5mm;}
  .slip-meta{font-size:7.5pt;margin-bottom:0.5mm;}
  .slip-table{width:100%;border-collapse:collapse;font-size:8.5pt;}
  .slip-table th,.slip-table td{border:1px solid #000;padding:0.3mm 1mm;line-height:1.2;}
  .slip-table th{background:#eee;}
  .slip-total{text-align:right;font-size:8pt;margin-top:1mm;}

  /* チェックリスト：2列4パレット（A4上下2分割） */
  /* 構成: 上段138mm + カットライン8mm + 下段131mm(余白7mm込み) = 277mm */
  .checklist-page{width:100%;page-break-after:always;}
  .checklist-page:last-child{page-break-after:auto;}
  .checklist-row{display:grid;grid-template-columns:1fr 1fr;gap:0;}
  .checklist-row-top .checklist-cell{height:138mm;}
  .checklist-row-bottom .checklist-cell{height:131mm;padding-top:10mm;}
  .checklist-cell{box-sizing:border-box;overflow:hidden;padding:3mm;border:none;}
  .checklist-cutline{width:100%;height:8mm;display:flex;align-items:center;justify-content:space-between;}
  .checklist-cutline-line{width:12mm;border-top:1px dashed #000;flex:none;}
  .checklist-cutline-label{display:none;}
  .checklist-pallet{height:100%;box-sizing:border-box;}
  .checklist-pallet-inner{height:100%;box-sizing:border-box;}
  .checklist-title{font-size:10pt;font-weight:bold;margin-bottom:2mm;}
  .checklist-table{width:100%;border-collapse:collapse;font-size:9pt;}
  .checklist-table th,.checklist-table td{border:1px solid #000;padding:1.5mm 2mm;}
  .checklist-table th{background:#eee;font-size:8.5pt;}
  .checklist-check{width:8mm;text-align:center;}
  .checklist-divider{display:none;}
  .checklist-page-break{page-break-after:always;}

  /* 請求書印刷 */
  .invoice-print{font-size:10.5pt;}
  .invoice-print table{width:100%;border-collapse:collapse;}
  .invoice-print th,.invoice-print td{border:1px solid #000;padding:2mm 3mm;}
  .invoice-print th{background:#eee;}
}
@media screen{#printArea{display:none;}}
</style>
</head>
<body>

<!-- タブバー -->
<div id="tabBar">
  <button class="tab active" onclick="showTab('tabPallet')">①パレット<br>＆印刷</button>
  <button class="tab" onclick="showTab('tabMaterial')">②使用<br>材料</button>
  <button class="tab" onclick="showTab('tabHistory')">③出荷<br>履歴</button>
  <button class="tab" onclick="showTab('tabInvoice')">④請求書</button>
  <button class="tab" onclick="showTab('tabSettings')">⚙️<br>設定</button>
</div>

<!-- ①パレット＆印刷タブ -->
<div id="tabPallet" class="tabContent active">
  <div class="card">
    <div class="cardTitle">出荷情報</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <div><label style="font-size:12px;color:#666;">出荷日</label><input type="date" id="shippingDate"></div>
      <div><label style="font-size:12px;color:#666;">伝票番号プレフィックス</label><input type="text" id="deliveryNo" placeholder="例: D-2026"></div>
    </div>
    <div style="margin-top:8px;">
      <label style="font-size:12px;color:#666;">出荷メモ</label>
      <textarea id="shippingMemo" rows="2" placeholder="小型パレット使用など"></textarea>
    </div>
  </div>
  <!-- 品目タイルグリッド -->
  <div class="card">
    <div class="cardTitle" style="display:flex;justify-content:space-between;align-items:center;">品目を選択してパレットに追加<button class="btn-gray btn-sm" id="tileEditBtn" onclick="toggleTileEdit()">✏️ 編集</button></div>
    <div id="itemTileGrid" class="item-tile-grid"></div>
  </div>

  <!-- パレット一覧 -->
  <div id="palletList"></div>

  <!-- バラ出荷 -->
  <div class="baraBlock">
    <div class="baraHeader">🚗 バラ（助手席/その他）</div>
    <div class="baraBody" id="baraBody"></div>
  </div>

  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">
    <button class="btn-primary" style="padding:10px 16px;font-size:15px;" onclick="addPallet()">＋ パレット追加</button>
    <button class="btn-success" style="padding:10px 16px;font-size:15px;" onclick="openPrintDelivery()">🖨 納品書印刷</button>
    <button class="btn-gray" style="padding:10px 16px;font-size:15px;" onclick="openPrintChecklist()">📋 チェックリスト印刷</button>
  </div>
</div>

<!-- ボトムシート：品目グループ選択 -->
<div id="bs-overlay" class="bs-overlay" onclick="closeBs()"></div>
<div id="bs" class="bs">
  <div class="bs-handle"></div>
  <div class="bs-header">
    <div id="bs-title" class="bs-title"></div>
    <div class="bs-close" onclick="closeBs()">✕</div>
  </div>
  <div class="bs-body">
    <div id="bs-body"></div>
    <div style="margin-top:12px;">
      <label style="font-size:14px;color:#666;display:block;margin-bottom:6px;font-weight:600;">追加先パレット</label>
      <select id="bs-pallet-sel" class="bs-pallet-select" style="width:100%;"></select>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;">
      <button class="btn-success" style="flex:1;padding:12px 8px;font-size:15px;" onclick="bsAddToPallet()">✅ パレットに追加</button>
      <button class="btn-warn" style="flex:1;padding:12px 8px;font-size:15px;" onclick="bsAddToBara()">🚗 バラに追加</button>
    </div>
  </div>
</div>


</div>

<!-- ②使用材料タブ -->
<div id="tabMaterial" class="tabContent">
  <div class="card">
    <div class="cardTitle">使用材料一覧（原反幅 1220mm）</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">
      <label style="font-size:12px;color:#666;white-space:nowrap;">集計日</label>
      <input type="date" id="materialDate" style="width:160px;">
      <button class="btn-primary btn-sm" onclick="calcMaterialFromHistory()">📊 集計</button>
      <button class="btn-gray btn-sm" onclick="setMaterialToday()">今日</button>
    </div>
    <div id="materialTable"></div>
  </div>
</div>

<!-- ③出荷履歴タブ -->
<div id="tabHistory" class="tabContent">
  <div class="card">
    <div style="display:flex;gap:8px;margin-bottom:8px;">
      <input type="text" id="historySearch" placeholder="伝票番号・日付で検索" oninput="renderHistory()">
    </div>
    <div id="historyList"></div>
  </div>
</div>

<!-- ④請求書タブ -->
<div id="tabInvoice" class="tabContent">
  <div class="card">
    <div class="cardTitle">月次合計請求書</div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:6px;">
        <label style="font-size:12px;color:#666;white-space:nowrap;">対象月</label>
        <input type="month" id="invoiceMonth" style="width:150px;">
      </div>
      <button class="btn-primary" onclick="calcInvoice()">📊 集計</button>
      <button class="btn-success no-print" onclick="printInvoice()">🖨 印刷</button>
    </div>
    <div id="invoiceResult"></div>
  </div>
</div>

<!-- ⚙️設定タブ -->
<div id="tabSettings" class="tabContent">
  <div class="card">
    <div class="cardTitle">自社情報</div>
    <div class="settingRow"><label>会社名</label><input type="text" id="companyName" placeholder="株式会社〇〇"></div>
    <div class="settingRow"><label>住所</label><input type="text" id="companyAddr" placeholder="大阪府〇〇市..."></div>
    <div class="settingRow"><label>電話番号</label><input type="text" id="companyTel" placeholder="06-XXXX-XXXX"></div>
  </div>
  <div class="card">
    <div class="cardTitle">得意先情報</div>
    <div class="settingRow"><label>得意先名</label><input type="text" id="clientName" placeholder="株式会社△△"></div>
    <div class="settingRow"><label>得意先住所</label><input type="text" id="clientAddr" placeholder="東京都〇〇区..."></div>
  </div>
  <div class="card">
    <div class="cardTitle">端末・接続</div>
    <div class="settingRow"><label>端末名</label><input type="text" id="deviceName" placeholder="事務PC"></div>
    <div class="settingRow"><label>GAS URL</label><input type="text" id="gasUrl" placeholder="https://script.google.com/..."></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <button class="btn-primary" onclick="saveSettings()">💾 設定を保存</button>
      <button class="btn-gray" onclick="pingGas()">🔗 接続確認</button>
      <button class="btn-gray" onclick="loadFromGas()">🔄 データ再読み込み</button>
    </div>
  </div>
</div>

<!-- 編集モーダル -->
<div id="editModal">
  <div id="editModalInner">
    <div style="font-weight:bold;font-size:14px;margin-bottom:12px;">📝 納品書を編集</div>
    <div id="editModalBody"></div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn-success" onclick="saveEditAndReprint()">💾 保存して再印刷</button>
      <button class="btn-primary" onclick="saveEditOnly()">💾 保存のみ</button>
      <button class="btn-gray" onclick="closeEditModal()">キャンセル</button>
    </div>
  </div>
</div>

<!-- 印刷エリア -->
<div id="printArea"></div>
<div id="toast"></div>
<div id="loading"><span>処理中...</span></div>

<script>
'use strict';

const MATERIAL_WIDTH = 1220;
const TAX_RATE = 0.10;

// ===== 状態 =====
let st = {
  itemMaster: [],
  plans: [],
  progress: {},
  pallets: [],
  bara: [],
  deliveryHistory: []
  // deliveryHistory の各レコード:
  // { id, timestamp, deviceName, shippingDate, memo,
  //   slips: [{slipNo, groupName, rows:[{itemId,name,color,qty,price}], subtotal, tax, total}],
  //   palletsSnapshot: {pallets, bara}  // チェックリスト用
  // }
};

let settings = {
  companyName:'', companyAddr:'', companyTel:'',
  clientName:'', clientAddr:'',
  deviceName:'', gasUrl:''
};

let _editingRecordId = null; // 編集中の履歴ID

// ===== 初期化 =====
window.addEventListener('DOMContentLoaded', ()=>{
  loadSettings();
  loadLocalState();
  setDefaultDate();
  setDefaultMonth();
  // 使用材料の集計日も今日に初期化
  const matDate = document.getElementById('materialDate');
  if(matDate && !matDate.value) matDate.value = today();
  renderItemTiles();
  renderPallets();
  renderBara();
  renderMaterial();
  renderHistory();
  if(settings.gasUrl){ loadFromGas(); startPolling(); }
});

function setDefaultDate(){
  const d = document.getElementById('shippingDate');
  if(!d.value) d.value = today();
}
function setDefaultMonth(){
  const m = document.getElementById('invoiceMonth');
  if(!m.value) m.value = today().slice(0,7);
}
function today(){
  return new Date().toISOString().slice(0,10);
}

// ===== 設定 =====
function loadSettings(){
  const s = localStorage.getItem('shippingSettings');
  if(s) Object.assign(settings, JSON.parse(s));
  document.getElementById('companyName').value = settings.companyName||'';
  document.getElementById('companyAddr').value = settings.companyAddr||'';
  document.getElementById('companyTel').value  = settings.companyTel||'';

// ===== GAS通信 =====
async function gasGet(action){
  const url = settings.gasUrl;
  if(!url){ toast('GAS URLを設定してください'); return null; }
  const res = await fetch(`${url}?action=${action}&v=${Date.now()}`,
    {method:'GET',redirect:'follow',cache:'no-store'});
  return res.json();
}
async function gasPost(payload){
  const url = settings.gasUrl;
  if(!url){ toast('GAS URLを設定してください'); return null; }
  const res = await fetch(`${url}?v=${Date.now()}`,{
    method:'POST',redirect:'follow',cache:'no-store',
    headers:{'Content-Type':'text/plain;charset=UTF-8'},
    body:JSON.stringify(payload)
  });
  return res.json();
}

async function loadFromGas(){
  showLoading(true);
  try{
    const data = await gasGet('getAll');
    if(data && Array.isArray(data.itemMaster) && data.itemMaster.length > 0){
      st.itemMaster = data.itemMaster.map(it=>({
        id:        String(it.id||''),
        name:      String(it.name||''),
        color:     String(it.color||''),
        prePh:     parseFloat(it.prePh)||0,
        postPh:    parseFloat(it.postPh)||0,
        sheetNo:   String(it.sheetNo||''),
        cutW:      String(it.cutW||''),
        cutL:      String(it.cutL||''),
        group:     String(it.group||'その他'),
        price:     parseFloat(it.price)||0,
        dispName:  String(it.dispName||''),
        dispColor: String(it.dispColor||''),
        caseQty:   parseFloat(it.caseQty)||0
      }));
    }
    if(data && data.plans)    st.plans    = data.plans;
    if(data && data.progress) st.progress = data.progress;
    const shData = await gasGet('getShipping');
    if(shData){
      if(shData.deliveryHistory){
        // GASのデータで常に上書き（全端末で同じ履歴を共有）
        st.deliveryHistory = shData.deliveryHistory.map(r=>{
          // palletsJsonにslipsが入っている場合は展開
          if(!r.slips && r.palletsJson){
            try{
              const pw = JSON.parse(r.palletsJson);
              if(pw.slips) r.slips = pw.slips;
              if(pw.palletsSnapshot) r.palletsSnapshot = pw.palletsSnapshot;
            }catch(e){}
          }
          if(!r.slips) r.slips = [];
          return r;
        });
      }
      if(shData.workData && st.pallets.every(p=>p.rows.every(r=>!r.itemId))){
        if(shData.workData.pallets) st.pallets = shData.workData.pallets;
        if(shData.workData.bara)    st.bara    = shData.workData.bara;
        const dateEl = document.getElementById('shippingDate');
        const noEl   = document.getElementById('deliveryNo');
        const memoEl = document.getElementById('shippingMemo');
        if(shData.workData.shippingDate && !dateEl.value) dateEl.value = shData.workData.shippingDate;
        if(shData.workData.deliveryNo)  noEl.value   = shData.workData.deliveryNo;
        if(shData.workData.memo)        memoEl.value = shData.workData.memo;
      }
      saveLocalState();
    }
    renderItemTiles(); renderPallets(); renderBara(); renderMaterial(); renderHistory();
    toast('データを読み込みました');
  }catch(e){ toast('読み込みエラー: '+e.message); }
  finally{ showLoading(false); }
}

async function pingGas(){
  showLoading(true);
  try{ const d = await gasGet('ping'); toast(d?'接続OK':'応答なし'); }
  catch(e){ toast('接続失敗: '+e.message); }
  finally{ showLoading(false); }
}

let _pollTimer=null;
function startPolling(){
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer = setInterval(async()=>{
    if(!settings.gasUrl) return;
    try{
      const shData = await gasGet('getShipping');
      if(!shData||!shData.workData) return;
      const focused = document.activeElement;
      if(focused&&(focused.tagName==='INPUT'||focused.tagName==='SELECT'||focused.tagName==='TEXTAREA')) return;

// ===== ケース数計算 =====
function caseLabel(item, qty){
  if(!item || !item.caseQty || item.caseQty <= 0) return '';
  const cases = qty / item.caseQty;
  const whole = Math.floor(cases);
  const rem = qty % item.caseQty;
  if(rem === 0) return `<span style="color:#0f3460;font-size:11px;">${whole}ケース</span>`;
  return `<span style="color:#0f3460;font-size:11px;">${whole}ケース+${rem}</span>`;
}

// 計画に基づく残数（計画数量 - 後工程合計）を返す（未登録は null）
function planRemaining(itemId){
  if(!itemId) return null;
  const plans = (st.plans||[]).filter(p=>p.itemId==itemId);
  if(plans.length===0) return null;
  let planTotal = plans.reduce((s,p)=>s+(parseInt(p.qty)||0),0);
  let doneTotal = 0;
  plans.forEach(p=>{
    let prog = null;
    if(Array.isArray(st.progress)){
      const row = st.progress.find(r=>r.planId==p.id);
      if(row){ try{ prog={postDone:JSON.parse(row.postDone||'{}')}; }catch(e){} }
    } else {
      prog = (st.progress||{})[p.id];
    }
    if(!prog) return;
    const postDone = prog.postDone||{};
    doneTotal += Object.values(postDone).reduce((a,v)=>a+(parseInt(v)||0),0);
  });
  return planTotal - doneTotal;
}
function plannedItemIds(){
  return new Set((st.plans||[]).map(p=>p.itemId));
}

function renderItemTiles(){
  const el = document.getElementById('itemTileGrid');
  if(!el) return;

  // グループごとに集計（品目マスターのgroup列）
  const groups = {};
  const ids = plannedItemIds();
  const items = ids.size > 0
    ? st.itemMaster.filter(m=>ids.has(m.id))
    : st.itemMaster;

  items.forEach(m=>{
    const g = m.group || 'その他';
    if(!groups[g]) groups[g] = {name:g, items:[]};
    groups[g].items.push(m);
  });

  if(Object.keys(groups).length === 0){
    el.innerHTML = '<p style="color:#999;font-size:12px;grid-column:1/-1;padding:8px;">品目マスターを読み込んでください</p>';
    return;
  }

  // パレット内の品目数量を集計（タイルに緑枠表示用）
  const palletQtyMap = {};
  st.pallets.forEach(p=>p.rows.forEach(r=>{
    if(r.itemId && r.qty) palletQtyMap[r.itemId] = (palletQtyMap[r.itemId]||0) + (parseInt(r.qty)||0);
  }));
  st.bara.forEach(r=>{
    if(r.itemId && r.qty) palletQtyMap[r.itemId] = (palletQtyMap[r.itemId]||0) + (parseInt(r.qty)||0);
  });

  const allGroups = Object.values(groups);
  const visibleGroups = _tileEditMode
    ? allGroups
    : allGroups.filter(g=>!_hiddenTiles.has(g.name));

  // 固定3列
  el.style.gridTemplateColumns = 'repeat(3, 1fr)';

  el.innerHTML = visibleGroups.map(g=>{
    const groupQty = g.items.reduce((s,m)=>s+(palletQtyMap[m.id]||0),0);
    const hasQty = groupQty > 0;
    const isHidden = _hiddenTiles.has(g.name);
    const dispName = g.items[0]?.dispName || g.name;
    const tileCls = ['item-tile', hasQty?'has-qty':'', _tileEditMode&&isHidden?'edit-mode':''].filter(Boolean).join(' ');
    const onclick = _tileEditMode ? '' : `onclick="openBs('${esc(g.name)}')"`;
    const hideBtn = _tileEditMode
      ? isHidden
        ? `<div class="tile-hide-btn" style="background:#27ae60;" onclick="showTile('${esc(g.name)}')">＋</div>`
        : `<div class="tile-hide-btn" onclick="hideTile('${esc(g.name)}')">✕</div>`
      : '';
    return `<div class="${tileCls}" ${onclick}>
      ${hideBtn}
      <div class="item-tile-name">${esc(dispName)}</div>
    </div>`;
  }).join('');
}

function bsAdj(itemId, delta){
  const inp = document.getElementById('bs-inp-'+itemId);
  if(!inp) return;
  const v = Math.max(0, (parseInt(inp.value)||0) + delta);
  inp.value = v;
  const item = st.itemMaster.find(m=>m.id==itemId);
  bsUpdateCase(itemId, item?.caseQty||0, v);
}

function bsUpdateCase(itemId, caseQty, qty){
  const el = document.getElementById('bs-case-'+itemId);
  if(!el) return;
  const q = parseInt(qty)||0;
  if(!caseQty || caseQty<=0 || q<=0){ el.textContent=''; return; }
  const whole = Math.floor(q/caseQty);
  const rem = q % caseQty;
  el.textContent = rem===0 ? whole+'ケース' : whole+'ケース+'+rem;
}

function bsAddToPallet(){
  const palIdx = parseInt(document.getElementById('bs-pallet-sel').value);
  if(isNaN(palIdx)||!st.pallets[palIdx]){ toast('パレットを選択してください'); return; }

  const ids = plannedItemIds();
  const allItems = ids.size > 0 ? st.itemMaster.filter(m=>ids.has(m.id)) : st.itemMaster;
  const groupItems = allItems.filter(m=>(m.group||'その他')===_bsGroup);

  let added = 0;
  groupItems.forEach(m=>{
    const inp = document.getElementById('bs-inp-'+m.id);
    const qty = parseInt(inp?.value)||0;
    if(qty <= 0) return;
    const memo_ = document.getElementById('bs-memo-'+m.id)?.value.trim()||'';
    // 既存行があれば数量を加算、なければ新規追加
    const existing = st.pallets[palIdx].rows.find(r=>r.itemId==m.id);
    if(existing){
      existing.qty = (parseInt(existing.qty)||0) + qty;
      if(memo_) existing.memo = memo_;
    } else {
      // 空行があれば置き換え
      const empty = st.pallets[palIdx].rows.find(r=>!r.itemId);
      if(empty){ empty.itemId=m.id; empty.qty=qty; empty.memo=memo_; }
      else st.pallets[palIdx].rows.push({itemId:m.id, qty, memo:memo_});
    }
    added++;
  });

  if(added===0){ toast('数量を入力してください'); return; }
  saveLocalState(); renderPallets(); renderBara(); renderMaterial(); renderItemTiles();
  saveShippingWork();
  closeBs();
  toast(`パレット${palIdx+1}に追加しました`);

function calcCases(item, qty){
  if(!item||!item.caseQty||item.caseQty<=0||qty<=0) return {cases:0, rem:0, label:''};
  const cases = Math.floor(qty/item.caseQty);
  const rem = qty % item.caseQty;
  const label = rem===0 ? cases+'箱' : cases+'箱+'+rem+'個';
  return {cases, rem, label};
}

function onCheckChange(itemId, val){
  _checkVals[itemId] = parseInt(val)||0;
  // 一致・不一致のスタイル更新
  const inp = document.getElementById('chk-'+itemId);
  const expected = document.getElementById('chk-exp-'+itemId);
  if(!inp||!expected) return;
  const exp = parseInt(expected.dataset.cases)||0;
  if(parseInt(val)===0){ inp.classList.remove('match','nomatch'); return; }
  if(parseInt(val)===exp){ inp.classList.add('match'); inp.classList.remove('nomatch'); }
  else { inp.classList.add('nomatch'); inp.classList.remove('match'); }
}

function collectAllRows(){
  const rows = [];
  st.pallets.forEach((p,pi)=>{
    p.rows.forEach(r=>{
      if(r.itemId&&r.qty){
        const item = st.itemMaster.find(m=>m.id==r.itemId);
        if(item) rows.push({item,qty:parseInt(r.qty)||0,memo:r.memo||''});
      }
    });
  });
  st.bara.forEach(r=>{
    if(r.itemId&&r.qty){
      const item = st.itemMaster.find(m=>m.id==r.itemId);
      if(item) rows.push({item,qty:parseInt(r.qty)||0,memo:r.memo||''});
    }
  });
  return rows;
}
function groupRowsByGroup(allRows){
  const gMap={};
  allRows.forEach(r=>{
    const g=r.item.group||'未分類';
    if(!gMap[g]) gMap[g]={};
    const k=r.item.id;
    if(!gMap[g][k]) gMap[g][k]={item:r.item,qty:0,memo:r.memo||''};
    gMap[g][k].qty+=r.qty;
    if(r.memo) gMap[g][k].memo=r.memo;
  });
  return Object.entries(gMap).map(([groupName,itemMap])=>({groupName,rows:Object.values(itemMap)}));
}

// 納品書履歴から品目・数量を集計してシート品番ごとに材料使用量を計算
function calcMaterialFromSlips(slipRows){
  // slipRows: [{name, color, qty, itemId}]
  // itemMasterからシート品番・寸法を取得
  const itemMap={};
  slipRows.forEach(r=>{
    const item = st.itemMaster.find(m=>m.id==r.itemId || (m.name==r.name && m.color==r.color));
    if(!item) return;
    const key = item.id;
    if(!itemMap[key]) itemMap[key]={item,totalQty:0};
    itemMap[key].totalQty += parseInt(r.qty)||0;
  });

  const grouped={};
  Object.values(itemMap).forEach(({item,totalQty})=>{
    const cutW=parseFloat(item.cutW)||0;
    const cutL=parseFloat(item.cutL)||0;
    const sheetNo=item.sheetNo||'';
    let takiCount=0,usedM=0,note='';
    if(cutW>0&&cutL>0){
      takiCount=Math.floor(MATERIAL_WIDTH/cutW)||1;
      usedM=Math.ceil(totalQty/takiCount)*cutL/1000;
    } else { note='寸法未設定'; }
    const key=sheetNo||'品番未設定';
    if(!grouped[key]) grouped[key]={rows:[],totalM:0};
    grouped[key].rows.push({item,totalQty,takiCount,usedM,note});
    grouped[key].totalM+=usedM;
  });
  return grouped;
}

function calcMaterialFromHistory(){
  const date = document.getElementById('materialDate').value;
  const el = document.getElementById('materialTable');
  if(!date){ el.innerHTML='<p style="color:#999;font-size:12px;padding:8px;">集計日を選択してください</p>'; return; }

  // 指定日の発行済み納品書を集計
  const records = st.deliveryHistory.filter(r=>
    r.type !== 'checklist' &&
    (r.shippingDate||'').startsWith(date) &&
    r.slips && r.slips.length > 0
  );

  if(records.length === 0){
    el.innerHTML=`<p style="color:#999;font-size:12px;padding:8px;">${date} の発行済み納品書がありません</p>`;
    return;
  }

  // 全納品書の品目・数量をまとめる
  const allSlipRows=[];
  records.forEach(rec=>{
    rec.slips.forEach(s=>{
      s.rows.forEach(r=>allSlipRows.push(r));
    });
  });

  const grouped = calcMaterialFromSlips(allSlipRows);
  const keys = Object.keys(grouped);
  if(keys.length===0){ el.innerHTML='<p style="color:#999;font-size:12px;padding:8px;">材料データがありません（品目マスターに寸法を登録してください）</p>'; return; }

  let html=`<div style="font-size:12px;color:#666;margin-bottom:8px;">📅 ${date}　納品書 ${records.length}件から集計</div>`;
  html+='<table><thead><tr><th>品目名</th><th>数量</th><th>幅取り</th><th>使用長(m)</th></tr></thead><tbody>';
  keys.forEach(key=>{
    const g=grouped[key];
    html+=`<tr class="group-header"><td colspan="3">📄 ${esc(key)}</td><td>合計 ${g.totalM.toFixed(2)} m</td></tr>`;
    g.rows.forEach(r=>{

    });

  html+='</tbody></table>';
  el.innerHTML=html;
}

function autoSlipNo(date, index, startNo){
  const d = date ? date.replace(/-/g,'').slice(2) : today().replace(/-/g,'').slice(2);
  return d + '-' + String(startNo + index).padStart(2,'0');
}

// 指定日の発行済み納品書件数をGASから取得
async function getTodaySlipCount(date){
  try{
    const shData = await gasGet('getShipping');
    if(!shData || !shData.deliveryHistory) return 0;
    let count = 0;
    shData.deliveryHistory
      .filter(r=> r.type !== 'checklist' && (r.shippingDate||'').startsWith(date))
      .forEach(r=>{
        // slipsが直接ある場合
        if(r.slips && r.slips.length > 0){
          count += r.slips.length;
          return;
        }
        // palletsJsonにslipsが入っている場合（GAS保存形式）
        if(r.palletsJson){
          try{
            const pw = JSON.parse(r.palletsJson);
            if(pw.slips && pw.slips.length > 0) count += pw.slips.length;
          }catch(e){}
        }
      });
    return count;
  }catch(e){
    console.warn('件数取得エラー:', e);
    return 0;
  }
}

  try{
    if(settings.gasUrl){

      if(data && data.plans)    st.plans    = data.plans;
      if(data && data.progress) st.progress = data.progress;
      saveLocalState();
    }
  }catch(e){ console.warn('データ再読み込みエラー:', e); }
  finally{ showLoading(false); }

  // ②残数超過チェック（警告のみ・ブロックなし）
  // 残数0=完了済み納品は正常なのでブロックしない

  // ③箱数チェック不一致チェック（ブロック）
  const unchecked = [], nomatch = [];
  st.pallets.forEach(p=>p.rows.forEach(r=>{
    if(!r.itemId||!r.qty) return;
    const item = st.itemMaster.find(m=>m.id==r.itemId);
    if(!item||!item.caseQty||item.caseQty<=0) return;
    const expectedCases = Math.floor((parseInt(r.qty)||0)/item.caseQty);
    if(expectedCases===0) return;
    const checkVal = _checkVals[r.itemId]||0;
    const label = `${item.name}${item.color?' ('+item.color+')':''}`;
    if(checkVal===0) unchecked.push(label+`: ${expectedCases}箱`);
    else if(checkVal!==expectedCases) nomatch.push(label+`: チェック${checkVal}箱 ≠ 登録${expectedCases}箱`);
  }));
  if(unchecked.length>0||nomatch.length>0){
    let msg2 = '箱数チェックが完了していません。\n\n';
    if(unchecked.length>0) msg2 += '【未チェック】\n'+unchecked.join('\n')+'\n\n';
    if(nomatch.length>0) msg2 += '【不一致】\n'+nomatch.join('\n');
    alert(msg2);
    return;
  }

  const grouped=groupRowsByGroup(allRows);
  const date=document.getElementById('shippingDate').value||today();

  showLoading(true);
  let startNo=1;
  try{
    if(settings.gasUrl){
      const res = await gasPost({action:'getSlipNo', date, count:grouped.length});
      if(res && res.ok) startNo = res.startNo;
    }
  }catch(e){ console.warn('採番エラー:', e); }
  finally{ showLoading(false); }

  // ④確認ダイアログ（計画残数未満の警告付き）
  const underItems = [];
  st.pallets.forEach(p=>p.rows.forEach(r=>{
    if(!r.itemId||!r.qty) return;
    const rem = planRemaining(r.itemId);
    const item = st.itemMaster.find(m=>m.id==r.itemId);
    if(rem!==null && parseInt(r.qty)<rem && parseInt(r.qty)>0){
      underItems.push(`${item?.name||''}${item?.color?' ('+item.color+')':''}: 入力${r.qty}個（残${rem}個）`);
    }
  }));

  const slipList = grouped.map((g,i)=>'  '+autoSlipNo(date,i,startNo)+' '+g.groupName).join('\n');
  let msg = '以下の納品書を発行しますか？\n\n出荷日: '+date+'\n\n'+slipList;
  if(underItems.length>0) msg += '\n\n⚠ 以下の品目は計画残数より少ない数量です:\n'+underItems.join('\n');
  msg += '\n\n発行すると履歴に保存されます。';
  if(!confirm(msg)) return;

  printDelivery(grouped, null, startNo);
}

function printDelivery(grouped, existingRecord, startNo=1){
  const date=document.getElementById('shippingDate').value||today();
  const memo=document.getElementById('shippingMemo').value.trim();

  // slipsを生成（品目・数量・金額を記録）
  const slips=grouped.map((g,gi)=>{
    // 再印刷時は既存のslipNoをそのまま使用
    const slipNo = (existingRecord && existingRecord.slips[gi])
      ? existingRecord.slips[gi].slipNo
      : autoSlipNo(date,gi,startNo);
    const rows=g.rows.map(r=>({
      itemId: r.item.id,
      name:   r.item.name,
      color:  r.item.color||'',
      qty:    r.qty,
      price:  r.item.price||0,
      amount: (r.item.price||0)*r.qty
    }));
    const subtotal=rows.reduce((s,r)=>s+r.amount,0);
    const tax=Math.floor(subtotal*TAX_RATE);
    const total=subtotal+tax;
    return {slipNo,groupName:g.groupName,rows,subtotal,tax,total};
  });

  const dividerHTML='';
  const cutMarks = `<div class="cut-mark cut-mark-tl"></div><div class="cut-mark cut-mark-tr"></div><div class="cut-mark cut-mark-bl"></div><div class="cut-mark cut-mark-br"></div>`;

  let printContent='';
  for(let i=0;i<slips.length;i+=3){
    const trio=slips.slice(i,i+3);
    while(trio.length<3) trio.push(null);
    const isLast=(i+3>=slips.length);
    printContent+=`<div class="slip-page${isLast?'':' slip-page-break'}">
      <div class="slip-unit">${cutMarks}<div class="delivery-slip">${trio[0]?buildSlipHTML(trio[0],date,memo):''}</div></div>
      ${dividerHTML}
      <div class="slip-unit">${cutMarks}<div class="delivery-slip">${trio[1]?buildSlipHTML(trio[1],date,memo):''}</div></div>
      ${dividerHTML}
      <div class="slip-unit">${cutMarks}<div class="delivery-slip">${trio[2]?buildSlipHTML(trio[2],date,memo):''}</div></div>
    </div>`;
  }
  document.getElementById('printArea').innerHTML=printContent;
  closeBs();
  window.print();

  // 印刷後に履歴保存（新規or既存更新）
  if(existingRecord){
    existingRecord.slips=slips;
    existingRecord.shippingDate=date;
    existingRecord.memo=memo;
    existingRecord.updatedAt=new Date().toISOString();
    saveLocalState();
    renderHistory();
  } else {
    saveDeliveryRecord(slips,date,memo,'delivery');
  }
}

    id:'dh_'+Date.now(),
    timestamp:new Date().toISOString(),
    deviceName:settings.deviceName||'',
    shippingDate:date.slice(0,10),
    memo:memo||'',
    type:type,
    slips:slips,
    palletsSnapshot:{pallets:JSON.parse(JSON.stringify(st.pallets)),bara:JSON.parse(JSON.stringify(st.bara))}
  };
  st.deliveryHistory.unshift(record);
  saveLocalState();
  renderHistory();
  if(settings.gasUrl){
    try{
      await gasPost({action:'saveShipping',records:[{
        id:record.id,
        timestamp:record.timestamp,
        deviceName:record.deviceName,
        deliveryNo:slips.length>0?slips[0].slipNo:'',
        memo:record.memo,
        shippingDate:record.shippingDate,
        type:record.type,
        palletsJson:JSON.stringify({slips,palletsSnapshot:record.palletsSnapshot})
      }]});
    }catch(e){ console.warn('GAS保存エラー',e); }
  }
}

// ===== 出荷履歴表示 =====
function renderHistory(){
  const el=document.getElementById('historyList');
  const q=(document.getElementById('historySearch')?.value||'').trim().toLowerCase();
  let list=st.deliveryHistory;
  if(q) list=list.filter(r=>(r.shippingDate||'').includes(q)||(r.slips||[]).some(s=>(s.slipNo||'').toLowerCase().includes(q)));
  if(list.length===0){ el.innerHTML='<p style="color:#999;font-size:12px;padding:8px;">履歴がありません</p>'; return; }
  el.innerHTML=list.map((r,i)=>`
    <div class="historyItem">
      <div class="historyHead" onclick="toggleHistory(${i})">
        <span>${r.shippingDate||'—'}　${r.type==='checklist'?'📋 チェックリスト':'🖨 納品書'}</span>
        <span style="color:#666;font-size:11px;">▼</span>
      </div>
      <div class="historyBody" id="hb_${i}">
        <div style="margin-bottom:6px;font-size:12px;">端末: ${esc(r.deviceName||'—')}　発行: ${toJST(r.timestamp)}${r.memo?'　メモ: '+esc(r.memo):''}</div>
        ${(r.slips||[]).map(s=>`
          <div class="historySlip">
            <div class="historySlipHead">
              <span><b>伝票 ${esc(s.slipNo)}</b>　${esc(s.groupName)}</span>
              <span>税込 ${s.total.toLocaleString()}円</span>
            </div>
            <div style="font-size:11px;color:#666;">${s.rows.map(row=>`${esc(row.name)} ${esc(row.color)} ×${row.qty}`).join('　')}</div>
          </div>
        `).join('')}
        <div style="display:flex;gap:6px;margin-top:8px;">
          ${r.type!=='checklist'?`<button class="btn-warn btn-sm" onclick="openEditModal('${r.id}')">✏️ 編集・再印刷</button>`:''}
          <button class="btn-danger btn-sm" onclick="deleteRecord('${r.id}')">🗑 削除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleHistory(i){
  document.getElementById('hb_'+i)?.classList.toggle('open');
}

async function deleteRecord(id){
  const record = st.deliveryHistory.find(r=>r.id===id);
  if(!record) return;
  const date = record.shippingDate?.slice(0,10)||'';
  const type = record.type==='checklist'?'チェックリスト':'納品書';
  const slipNos = (record.slips||[]).map(s=>s.slipNo).join('・');
  const msg = '以下の履歴を削除しますか？\n\n種別: '+type+'\n出荷日: '+date+(slipNos?'\n伝票番号: '+slipNos:'')+'\n\nスプレッドシートからも削除されます。';
  if(!confirm(msg)) return;

  showLoading(true);
  try{
    // GASから削除
    if(settings.gasUrl){
      const res = await gasPost({action:'deleteShipping', id});
      if(res && !res.ok){
        toast('GAS削除エラー: '+res.error);
        return;
      }
      // GASから最新の履歴を再取得して同期
      const shData = await gasGet('getShipping');
      if(shData && shData.deliveryHistory){
        st.deliveryHistory = shData.deliveryHistory.map(r=>{
          if(!r.slips && r.palletsJson){
            try{
              const pw = JSON.parse(r.palletsJson);
              if(pw.slips) r.slips = pw.slips;
              if(pw.palletsSnapshot) r.palletsSnapshot = pw.palletsSnapshot;
            }catch(e){}
          }
          if(!r.slips) r.slips = [];
          return r;
        });
      }
    } else {
      // GAS未設定の場合はローカルのみ削除
      st.deliveryHistory = st.deliveryHistory.filter(r=>r.id!==id);
    }
    saveLocalState();
    renderHistory();
    toast('削除しました');
  }catch(e){
    toast('削除エラー: '+e.message);
  }finally{
    showLoading(false);
  }
}

// ===== 編集モーダル =====
function openEditModal(id){
  const record=st.deliveryHistory.find(r=>r.id===id);
  if(!record){ toast('履歴が見つかりません'); return; }
  _editingRecordId=id;

  // 出荷日・メモをパレットタブに反映
  document.getElementById('shippingDate').value=record.shippingDate||today();
  document.getElementById('shippingMemo').value=record.memo||'';

  // 編集UIを生成（slipsを編集可能な形で表示）
  const el=document.getElementById('editModalBody');
  el.innerHTML=`
    <div style="margin-bottom:10px;font-size:12px;color:#666;">出荷日・メモはパレット画面の入力欄で変更できます</div>
    ${(record.slips||[]).map((s,si)=>`
      <div class="editSlipBlock">
        <div class="editSlipHead">伝票 ${esc(s.slipNo)}　${esc(s.groupName)}</div>
        <div class="editSlipBody">
          ${s.rows.map((r,ri)=>`
            <div class="editRow">
              <div style="font-size:12px;">${esc(r.name)} (${esc(r.color)})</div>
              <input type="number" min="0" value="${r.qty}"
                onchange="updateEditQty(${si},${ri},this.value)"
                oninput="updateEditQty(${si},${ri},this.value)">
              <div></div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;
  document.getElementById('editModal').classList.add('open');
}

function updateEditQty(slipIdx,rowIdx,val){
  const record=st.deliveryHistory.find(r=>r.id===_editingRecordId);
  if(!record||!record.slips[slipIdx]) return;
  const row=record.slips[slipIdx].rows[rowIdx];
  row.qty=parseInt(val)||0;
  row.amount=row.price*row.qty;
  const s=record.slips[slipIdx];
  s.subtotal=s.rows.reduce((sum,r)=>sum+r.amount,0);
  s.tax=Math.floor(s.subtotal*TAX_RATE);
  s.total=s.subtotal+s.tax;
}

function closeEditModal(){
  _editingRecordId=null;
  document.getElementById('editModal').classList.remove('open');
}

function saveEditOnly(){
  if(!_editingRecordId) return;
  saveLocalState();
  toast('保存しました');
  closeEditModal();
  renderHistory();
}

function saveEditAndReprint(){
  if(!_editingRecordId) return;
  const record=st.deliveryHistory.find(r=>r.id===_editingRecordId);
  if(!record) return;
  closeEditModal();
  // slipsをgrouped形式に変換して再印刷
  const grouped=record.slips.map(s=>({
    groupName:s.groupName,
    rows:s.rows.map(r=>({item:{id:r.itemId,name:r.name,color:r.color,price:r.price},qty:r.qty}))
  }));
  printDelivery(grouped, record);
  saveLocalState();
  renderHistory();
}

// ===== 請求書集計 =====
function calcInvoice(){
  const month=document.getElementById('invoiceMonth').value;
  if(!month){ toast('対象月を選択してください'); return; }
  const target=month.slice(0,7);
  const records=st.deliveryHistory.filter(r=>
    r.type!=='checklist' &&
    r.shippingDate &&
    (r.shippingDate||'').slice(0,7)===target &&
    r.slips && r.slips.length>0
  );
  if(records.length===0){
    document.getElementById('invoiceResult').innerHTML='<p style="color:#999;font-size:12px;padding:8px;">該当する納品書がありません</p>';
    return;
  }

  // 全slipsを品目グループごとに集計
  const groupMap={};
  records.forEach(rec=>{
    rec.slips.forEach(s=>{
      s.rows.forEach(r=>{
        const key=`${r.name}|${r.color}`;
        if(!groupMap[key]) groupMap[key]={name:r.name,color:r.color,price:r.price,qty:0,amount:0};
        groupMap[key].qty+=r.qty;
        groupMap[key].amount+=r.amount;
      });
    });
  });

  const rows=Object.values(groupMap);
  const subtotal=rows.reduce((s,r)=>s+r.amount,0);
  const tax=Math.floor(subtotal*TAX_RATE);
  const total=subtotal+tax;

  const el=document.getElementById('invoiceResult');
  el.innerHTML=`
    <div id="invoicePrintContent">
      <div style="font-size:14px;font-weight:bold;text-align:center;margin-bottom:8px;">合計請求書　${month.replace('-','年')}月分</div>
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:8px;">
        <div><b>${esc(settings.clientName)||'得意先名'}</b> 御中</div>
        <div style="text-align:right;">${esc(settings.companyName)||'自社名'}<br>${esc(settings.companyAddr)||''}<br>TEL: ${esc(settings.companyTel)||''}</div>
      </div>
      <table class="invoiceTable">
        <thead><tr><th>品目名</th><th>カラー</th><th style="text-align:right;">数量</th><th style="text-align:right;">単価</th><th style="text-align:right;">金額</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td>${esc(r.name)}</td><td>${esc(r.color)}</td>
            <td style="text-align:right;">${r.qty}</td>
            <td style="text-align:right;">${r.price?r.price.toLocaleString():''}</td>
            <td style="text-align:right;">${r.amount?r.amount.toLocaleString():''}</td>
          </tr>`).join('')}
        </tbody>
        <tfoot>
          <tr class="subtotal"><td colspan="4" style="text-align:right;">小計</td><td style="text-align:right;">${subtotal.toLocaleString()}円</td></tr>
          <tr class="subtotal"><td colspan="4" style="text-align:right;">消費税(10%)</td><td style="text-align:right;">${tax.toLocaleString()}円</td></tr>
          <tr class="total"><td colspan="4" style="text-align:right;">税込合計</td><td style="text-align:right;">${total.toLocaleString()}円</td></tr>
        </tfoot>
      </table>
      <div style="font-size:11px;color:#666;margin-top:8px;">納品書件数: ${records.length}件　集計日: ${today()}</div>
    </div>
  `;
}

function printInvoice(){
  const content=document.getElementById('invoicePrintContent');
  if(!content){ toast('先に集計してください'); return; }
  document.getElementById('printArea').innerHTML=`<div class="invoice-print">${content.innerHTML}</div>`;
  closeBs();
  window.print();
}

// ===== タブ切り替え =====
function showTab(id){
  const tabs=['tabPallet','tabMaterial','tabHistory','tabInvoice','tabSettings'];
  document.querySelectorAll('.tabContent').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  document.querySelectorAll('.tab')[tabs.indexOf(id)]?.classList.add('active');
  if(id==='tabMaterial') renderMaterial();
  if(id==='tabHistory')  renderHistory();
}

// ===== ユーティリティ =====
// UTC→日本時間（JST）に変換して表示用文字列を返す
function toJST(isoStr){
  if(!isoStr) return '—';
  const d = new Date(isoStr);
  if(isNaN(d.getTime())) return isoStr.slice(0,16).replace('T',' ');
  return d.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.display='none';},3500);
}
function showLoading(v){
  document.getElementById('loading').style.display=v?'flex':'none';
}
